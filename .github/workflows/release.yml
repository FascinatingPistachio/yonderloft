name: Build and Release
permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flatpak and Builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          # Add flathub specifically for the current user
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak Bundle
        run: |
          # Install the required GNOME SDK and Platform locally for the user
          flatpak --user install -y flathub org.gnome.Sdk//48 org.gnome.Platform//48
          
          # Build the application
          flatpak-builder --user --force-clean --repo=repo build-dir build-aux/flatpak/uk.aaronworld.Yonderloft.json
          
          # Bundle it into a single transferable .flatpak file
          flatpak build-bundle repo Yonderloft.flatpak uk.aaronworld.Yonderloft

      - name: Determine release tag
        id: release-tag
        run: |
          set -euo pipefail
          latest=$(curl -fsSL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=1" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data[0]["tag_name"] if data else "")')
          if [ -z "$latest" ]; then
            version=$(awk -F"'" '/^[[:space:]]*version:/{print $2; exit}' meson.build)
            tag="v$version"
          else
            tag=$(python3 <<PY
import re
latest='$latest'
m=re.match(r'^v(\d+)\.(\d+)\.(\d+)$', latest)
if m:
    print(f'v{int(m.group(1))}.{int(m.group(2))}.{int(m.group(3))+1}')
else:
    print(latest)
PY
)
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          status=$(curl -sSL -o /dev/null -w '%{http_code}' -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/$tag")
          if [ "$status" = "200" ]; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.release-tag.outputs.release_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ steps.release-tag.outputs.release_tag }}
          name: Yonderloft ${{ steps.release-tag.outputs.release_tag }}
          files: |
            Yonderloft.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
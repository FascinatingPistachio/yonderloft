name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow only when you push a tag like "v1.0.0"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build the Flatpak bundle using the community action
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: Yonderloft.flatpak
          manifest-path: build-aux/flatpak/uk.aaronworld.Yonderloft.json
          cache-key: flatpak-builder-${{ github.sha }}

      # Upload the built artifact to a new GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            Yonderloft.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
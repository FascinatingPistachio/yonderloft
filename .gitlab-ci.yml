# CI for Yonderloft.
#
#   check   → catalog validation + Python lint   (every push/MR)
#   test    → pytest of the GTK-free layer        (every push/MR)
#   build   → build the Flatpak bundle            (MRs, default branch, tags)
#   release → auto-publish a GitLab Release        (default branch + tags)
#
# Releases are AUTOMATIC: the version comes from a tag (vX.Y.Z) or, on the
# default branch, from meson.build. If a Release for that version already
# exists the job skips, so ordinary pushes do nothing — but bumping `version:`
# in meson.build (or pushing a tag) publishes a new Release with the .flatpak
# attached, no manual steps.

stages:
  - check
  - test
  - build
  - release

variables:
  APP_ID: "uk.aaronworld.Yonderloft"
  BUNDLE: "yonderloft.flatpak"
  MANIFEST_PATH: "build-aux/flatpak/uk.aaronworld.Yonderloft.json"
  # The app's runtime (org.gnome.Platform//48) comes from Flathub.
  FLATHUB_REPO: "https://dl.flathub.org/repo/flathub.flatpakrepo"

# ---------------------------------------------------------------------------
# check
# ---------------------------------------------------------------------------

# Validate the catalog against the schema + integrity rules so community title
# MRs get checked automatically.
catalog:
  stage: check
  image: python:3.12-slim
  before_script:
    - pip install --quiet jsonschema
  script:
    - python3 -m yonderloft.tools.validate_catalog catalog/manifest.json
  variables:
    PYTHONPATH: src
  rules:
    - changes:
        - catalog/**/*
        - src/yonderloft/tools/**/*

# Lint the Python shell for syntax errors and undefined names.
lint:
  stage: check
  image: python:3.12-slim
  before_script:
    - pip install --quiet pyflakes
  script:
    - python3 -m py_compile $(find src -name '*.py')
    - python3 -m pyflakes src/yonderloft

# ---------------------------------------------------------------------------
# test
# ---------------------------------------------------------------------------

# Unit-test the GTK-free layer. The GUI shell is exercised by the Flatpak build.
pytest:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --quiet pytest jsonschema
  script:
    - python3 -m pytest

# ---------------------------------------------------------------------------
# build
# ---------------------------------------------------------------------------

# Build the single-file Flatpak bundle. Runs on tags (for release), and on MRs
# and the default branch so a broken manifest is caught before tagging.
#
# Self-contained (no external CI template). The GNOME runtime image ships a
# setuid bwrap, which is what lets flatpak-builder run on GitLab.com's
# unprivileged shared runners; plain Fedora/Docker images can't.
flatpak:
  stage: build
  image: quay.io/gnome_infrastructure/gnome-runtime-images:gnome-master
  rules:
    - if: "$CI_COMMIT_TAG"
    - if: "$CI_PIPELINE_SOURCE == 'merge_request_event'"
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  script:
    # Pull the app's runtime + SDK (org.gnome.*//48) from Flathub on demand.
    - flatpak --user remote-add --if-not-exists flathub "$FLATHUB_REPO"
    - flatpak-builder --user --install-deps-from=flathub --disable-rofiles-fuse
        --force-clean --repo=repo flatpak_app "$MANIFEST_PATH"
    # Export a single installable bundle; --runtime-repo tells installers where
    # to fetch the runtime from on first install.
    - flatpak build-bundle repo "$BUNDLE" --runtime-repo="$FLATHUB_REPO" "$APP_ID"
  artifacts:
    paths:
      - "$BUNDLE"
    expire_in: 1 week

# ---------------------------------------------------------------------------
# release (default branch + tags) — automatic, idempotent
# ---------------------------------------------------------------------------

# Resolves the version (tag, or meson.build on the default branch), and if no
# Release exists for it yet: uploads the built bundle to the Package Registry
# and creates the Release with it attached. Already-released versions are
# skipped, so this is safe to run on every push.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: flatpak
      artifacts: true
  rules:
    - if: "$CI_COMMIT_TAG"
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  script:
    - |
      set -e
      apk add --no-cache curl >/dev/null

      if [ -n "$CI_COMMIT_TAG" ]; then
        TAG="$CI_COMMIT_TAG"
      else
        VERSION=$(sed -n "s/.*version: *'\([^']*\)'.*/\1/p" meson.build | head -n1)
        TAG="v${VERSION}"
      fi
      echo "Resolved release tag: $TAG"

      CODE=$(curl -s -o /dev/null -w "%{http_code}" --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases/$TAG")
      if [ "$CODE" = "200" ]; then
        echo "Release $TAG already exists — nothing to do."
        exit 0
      fi

      PACKAGE_URL="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/yonderloft/$TAG/$BUNDLE"
      echo "Uploading $BUNDLE -> $PACKAGE_URL"
      curl --fail --silent --show-error --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --upload-file "$BUNDLE" "$PACKAGE_URL"

      release-cli create \
        --tag-name "$TAG" \
        --ref "$CI_COMMIT_SHA" \
        --name "Yonderloft $TAG" \
        --description "Automated Flatpak build for $TAG. Install with: flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo && flatpak install --user $BUNDLE && flatpak run $APP_ID" \
        --assets-link "{\"name\":\"$BUNDLE (Flatpak bundle)\",\"url\":\"$PACKAGE_URL\",\"link_type\":\"package\"}"

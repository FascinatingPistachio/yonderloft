<?xml version="1.0" encoding="UTF-8"?>
<!--
  Yonderloft — app icon. A treasure chest of old games, lit from within: warm
  amber light spilling from the seam. "Treasures of the old web, kept in the
  loft." A fresh concept (no longer a window), still the dusk + amber palette.

  GNOME HIG app-icon template (128px, flat colour on straight surfaces, amber
  gradient only on the glowing light, a darker front lip for Adwaita depth, no
  external drop shadow). PNGs come from this master via build-aux/render-icon.py.
-->
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chest" x1="64" y1="36" x2="64" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3A3252"/>
      <stop offset="1" stop-color="#211C2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="64" cy="62" r="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF6D8"/>
      <stop offset="0.5" stop-color="#FBC638"/>
      <stop offset="1" stop-color="#E5A50A"/>
    </radialGradient>
    <linearGradient id="clasp" x1="64" y1="52" x2="64" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD15C"/>
      <stop offset="1" stop-color="#E5A50A"/>
    </linearGradient>
  </defs>

  <!-- Soft light spilling from the chest. -->
  <ellipse cx="64" cy="60" rx="46" ry="20" fill="url(#glow)" opacity="0.35"/>

  <!-- Domed lid. -->
  <path d="M22 62 V56 Q22 36 64 36 Q106 36 106 56 V62 Z" fill="url(#chest)"/>

  <!-- Glowing seam where the lid lifts. -->
  <rect x="22" y="58" width="84" height="7" rx="3" fill="url(#glow)"/>

  <!-- Chest base. -->
  <rect x="24" y="63" width="80" height="40" rx="8" fill="url(#chest)"/>

  <!-- Metal bands (kept within the lid/base silhouette). -->
  <rect x="38" y="49" width="7" height="54" fill="#1B1626" opacity="0.55"/>
  <rect x="83" y="49" width="7" height="54" fill="#1B1626" opacity="0.55"/>

  <!-- Gold clasp crossing the seam. -->
  <rect x="56" y="55" width="16" height="20" rx="3" fill="url(#clasp)"/>
  <rect x="61" y="62" width="6" height="7" rx="2" fill="#5A3A02"/>

  <!-- Darker front lip for Adwaita depth. -->
  <rect x="24" y="96" width="80" height="7" rx="3" fill="#181420"/>
</svg>
